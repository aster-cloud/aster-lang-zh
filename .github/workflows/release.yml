name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-en
          path: aster-lang-en
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      # 共享版本目录（aster-lang-platform，ADR 0012）—— core/en settings 依赖它，
      # 必须先发布到 Maven Local，否则 core/en 构建解析不到 asterLibs。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish dependencies to Maven Local
        run: |
          cd aster-lang-platform && ./gradlew publishToMavenLocal
          cd ../aster-lang-core && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-en && ./gradlew publishToMavenLocal -x test

      - name: Build & Test
        run: ./gradlew build

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
